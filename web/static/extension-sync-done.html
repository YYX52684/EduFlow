<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平台配置已写入 - EduFlow</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    main {
      flex: 1;
      padding: 24px 20px 100px;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
    }
    h1 { font-size: 1.35rem; margin: 0 0 12px 0; color: #047857; }
    p { line-height: 1.6; color: #374151; margin: 0 0 12px 0; font-size: 15px; }
    .workspace-id {
      font-family: ui-monospace, monospace;
      background: #f3f4f6;
      padding: 8px 12px;
      border-radius: 8px;
      word-break: break-all;
      margin: 16px 0;
      font-size: 14px;
    }
    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      background: linear-gradient(180deg, transparent, #fff 28%);
      border-top: 1px solid #e5e7eb;
      background-color: #fff;
    }
    footer .inner {
      max-width: 520px;
      margin: 0 auto;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: #4f46e5;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    .btn-primary:hover { background: #4338ca; }
    .hint { font-size: 13px; color: #6b7280; margin-top: 10px; text-align: center; }
  </style>
</head>
<body>
  <main>
    <h1>平台配置已写入工作区</h1>
    <p>已从浏览器扩展将智慧树平台的 URL、Cookie、JWT 与节点 ID 同步到本地 EduFlow 工作区配置文件 <code>platform_config.json</code>。</p>
    <p>工作区：</p>
    <div class="workspace-id" id="workspace-display">—</div>
    <p>点击下方按钮打开<strong>旧版 HTML 交互控制台</strong>（非 React 版），即可在该工作区使用 Web 端能力。</p>
  </main>
  <footer>
    <div class="inner">
      <a class="btn-primary" id="open-console" href="#">打开旧版交互控制台</a>
      <p class="hint">若未登录，控制台将先显示登录页。</p>
    </div>
  </footer>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var ws = params.get("workspace") || "";
      var el = document.getElementById("workspace-display");
      var btn = document.getElementById("open-console");
      if (el) el.textContent = ws || "（未指定，请从扩展重新同步）";
      if (btn) {
        if (ws) {
          btn.href = "/w/" + encodeURIComponent(ws);
        } else {
          btn.href = "/";
          btn.textContent = "打开 EduFlow 首页";
        }
      }
    })();
  </script>
</body>
</html>
