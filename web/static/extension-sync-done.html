<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平台配置已写入 - EduFlow</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif;
      color: #1a1a1a;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background:
        radial-gradient(120% 120% at 0% 0%, rgba(125, 211, 252, 0.4), rgba(125, 211, 252, 0) 52%),
        radial-gradient(120% 120% at 100% 0%, rgba(196, 181, 253, 0.42), rgba(196, 181, 253, 0) 52%),
        linear-gradient(180deg, #edf3ff 0%, #e7eef9 100%);
    }
    main {
      flex: 1;
      padding: 24px 20px 100px;
      max-width: 520px;
      margin: 16px auto 0;
      width: 100%;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.58);
      border-radius: 16px;
      backdrop-filter: blur(18px) saturate(165%);
      -webkit-backdrop-filter: blur(18px) saturate(165%);
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.14);
    }
    h1 { font-size: 1.35rem; margin: 0 0 12px 0; color: #047857; }
    p { line-height: 1.6; color: #374151; margin: 0 0 12px 0; font-size: 15px; }
    .workspace-id {
      font-family: ui-monospace, monospace;
      background: rgba(255, 255, 255, 0.42);
      border: 1px solid rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 8px 12px;
      border-radius: 10px;
      word-break: break-all;
      margin: 16px 0;
      font-size: 14px;
    }
    footer {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
      background: rgba(255, 255, 255, 0.45);
      border-top: 1px solid rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(18px) saturate(165%);
      -webkit-backdrop-filter: blur(18px) saturate(165%);
    }
    footer .inner {
      max-width: 520px;
      margin: 0 auto;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.9), rgba(99, 102, 241, 0.8));
      border: 1px solid rgba(255, 255, 255, 0.45);
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: transform 0.16s ease, box-shadow 0.2s ease, background 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.18);
      background: linear-gradient(135deg, rgba(67, 56, 202, 0.94), rgba(79, 70, 229, 0.86));
    }
    .hint { font-size: 13px; color: #6b7280; margin-top: 10px; text-align: center; }

    @media (prefers-color-scheme: dark) {
      body {
        color: #e5e7eb;
        background:
          radial-gradient(120% 120% at 0% 0%, rgba(14, 116, 144, 0.24), rgba(14, 116, 144, 0) 52%),
          radial-gradient(120% 120% at 100% 0%, rgba(76, 29, 149, 0.28), rgba(76, 29, 149, 0) 52%),
          linear-gradient(180deg, #0b1220 0%, #121a2b 100%);
      }
      main {
        background: rgba(17, 24, 39, 0.5);
        border-color: rgba(148, 163, 184, 0.32);
        box-shadow: 0 14px 30px rgba(2, 6, 23, 0.42);
      }
      p, .hint { color: #cbd5e1; }
      .workspace-id {
        color: #e2e8f0;
        background: rgba(15, 23, 42, 0.42);
        border-color: rgba(148, 163, 184, 0.38);
      }
      footer {
        background: rgba(15, 23, 42, 0.45);
        border-top-color: rgba(148, 163, 184, 0.35);
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>平台配置已写入工作区</h1>
    <p>已从浏览器扩展将智慧树平台的 URL、Cookie、JWT 与节点 ID 同步到本地 EduFlow 工作区配置文件 <code>platform_config.json</code>。</p>
    <p>工作区：</p>
    <div class="workspace-id" id="workspace-display">—</div>
    <p>点击下方按钮打开<strong>旧版 HTML 交互控制台</strong>（非 React 版），即可在该工作区使用 Web 端能力。</p>
  </main>
  <footer>
    <div class="inner">
      <a class="btn-primary" id="open-console" href="#">打开旧版交互控制台</a>
      <p class="hint">若未登录，控制台将先显示登录页。</p>
    </div>
  </footer>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var ws = params.get("workspace") || "";
      var el = document.getElementById("workspace-display");
      var btn = document.getElementById("open-console");
      if (el) el.textContent = ws || "（未指定，请从扩展重新同步）";
      if (btn) {
        if (ws) {
          btn.href = "/w/" + encodeURIComponent(ws);
        } else {
          btn.href = "/";
          btn.textContent = "打开 EduFlow 首页";
        }
      }
    })();
  </script>
</body>
</html>
